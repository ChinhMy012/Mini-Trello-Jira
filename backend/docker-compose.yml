version: '3.8'

services:
  mysqldb:
    image: mysql:8.0
    container_name: trello-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: trello_db
      MYSQL_USER: trello_user
      MYSQL_PASSWORD: trello_password
    ports:
      - "3308:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: