spring:
  datasource:
    url: jdbc:mysql://localhost:3308/trello_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: trello_user
    password: trello_password
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true